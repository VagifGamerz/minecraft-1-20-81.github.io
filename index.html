<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAGIF GAMERZ | MCPE 1.20.81</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --mc-green: #39FF14; --mc-gold: #ffcc00; }
        body { background: #0a0a0a; color: white; font-family: 'Ubuntu', sans-serif; margin: 0; text-align: center; }
        
        /* Üst Panel */
        .nav { background: rgba(0,255,20,0.1); padding: 15px; border-bottom: 2px solid var(--mc-green); display: flex; justify-content: center; gap: 20px; }
        .l-btn { cursor: pointer; color: var(--mc-gold); font-weight: bold; font-size: 12px; text-decoration: underline; }

        .container { max-width: 600px; margin: 40px auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 30px rgba(57, 255, 20, 0.1); }
        
        .logo { width: 150px; filter: drop-shadow(0 0 10px var(--mc-green)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-family: 'Press+Start+2P', cursive; font-size: 0.8rem; color: var(--mc-green); margin: 25px 0; line-height: 1.6; }

        .dl-btn { display: inline-block; background: transparent; color: var(--mc-green); padding: 20px 40px; text-decoration: none; font-family: 'Press+Start+2P', cursive; border: 2px solid var(--mc-green); border-radius: 10px; transition: 0.3s; font-size: 1rem; }
        .dl-btn:hover { background: var(--mc-green); color: black; box-shadow: 0 0 40px var(--mc-green); }

        /* Mod Bölməsi */
        .mod-box { margin-top: 40px; text-align: left; background: #111; padding: 20px; border-radius: 10px; border-left: 4px solid var(--mc-gold); }
        .mod-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .soon { color: #ff4444; font-weight: bold; font-size: 10px; }

        footer { margin-top: 50px; font-size: 10px; color: #555; padding: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <span onclick="ch('az')" class="l-btn">AZERBAIJAN</span>
        <span onclick="ch('tr')" class="l-btn">TÜRKÇE</span>
        <span onclick="ch('en')" class="l-btn">ENGLISH</span>
    </div>

    <div class="container">
        <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png'" class="logo">
        
        <h1 id="title">MINECRAFT PE 1.20.81 <br> YÜKLƏMƏ MƏRKƏZİ</h1>

        <p id="status" style="color: #888; font-size: 12px; margin-bottom: 30px;">● SİSTEM ONLİNE | TƏHLÜKƏSİZLİK YOXLANILDI</p>

        <a href="https://drive.google.com/drive/folders/1Mjil8yqqdB4jr1wCc-xb3quLzrf6pFPL" class="dl-btn" id="btn">YÜKLƏ</a>

        <div class="mod-box">
            <h3 id="m-head" style="color: var(--mc-gold); margin-top:0">MÖVCUD MODLAR:</h3>
            <div class="mod-item"><span id="m1">Ölümsüzlük Modu</span> <span class="soon" id="s1">TEZLİKLƏ</span></div>
            <div class="mod-item"><span id="m2">Bütün Skinlər Açıq</span> <span class="soon" id="s2">TEZLİKLƏ</span></div>
            <div class="mod-item"><span id="m3">Salyan City Xəritəsi</span> <span class="soon" id="s3">TEZLİKLƏ</span></div>
        </div>
    </div>

    <footer>
        VAGIF GAMERZ OFFICIAL | 2026 <br>
        GOOGLE DRIVE SECURE LINK ENABLED
    </footer>

    <script>
        const lang = {
            az: { t: "MINECRAFT PE 1.20.81 <br> YÜKLƏMƏ MƏRKƏZİ", s: "● SİSTEM ONLİNE | TƏHLÜKƏSİZLİK YOXLANILDI", b: "YÜKLƏ", mh: "MÖVCUD MODLAR:", m1: "Ölümsüzlük Modu", m2: "Bütün Skinlər Açıq", m3: "Salyan City Xəritəsi", sn: "TEZLİKLƏ" },
            tr: { t: "MINECRAFT PE 1.20.81 <br> İNDİRME MERKEZİ", s: "● SİSTEM ÇEVRİMİÇİ | GÜVENLİK TARANDI", b: "İNDİR", mh: "MEVCUT MODLAR:", m1: "Ölümsüzlük Modu", m2: "Tüm Skinler Açık", m3: "Salyan Şehri Haritası", sn: "YAKINDA" },
            en: { t: "MINECRAFT PE 1.20.81 <br> DOWNLOAD CENTER", s: "● SYSTEM ONLINE | SECURITY SCANNED", b: "DOWNLOAD", mh: "AVAILABLE MODS:", m1: "God Mode", m2: "All Skins Unlocked", m3: "Salyan City Map", sn: "COMING SOON" }
        };

        function ch(l) {
            document.getElementById('title').innerHTML = lang[l].t;
            document.getElementById('status').innerText = lang[l].s;
            document.getElementById('btn').innerText = lang[l].b;
            document.getElementById('m-head').innerText = lang[l].mh;
            document.getElementById('m1').innerText = lang[l].m1;
            document.getElementById('m2').innerText = lang[l].m2;
            document.getElementById('m3').innerText = lang[l].m3;
            document.getElementById('s1').innerText = lang[l].sn;
            document.getElementById('s2').innerText = lang[l].sn;
            document.getElementById('s3').innerText = lang[l].sn;
        }
    </script>
</body>
</html>
